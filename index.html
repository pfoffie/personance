<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2a3042" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Stay in touch with what matters." />
  <meta property="og:title" content="Personance" />
  <meta property="og:description" content="Stay in touch with what matters." />
  <meta property="og:image" content="assets/share.jpg" />
  <title>Personance</title>
  <link rel="stylesheet" href="css/styles.css?v=1.3.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon_192.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon_180.png" />
  <!-- Push notification credentials — edit push-config.js to enable OneSignal -->
  <script src="push-config.js" defer></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      const cfg = (window.PUSH_CONFIG && (window.PUSH_CONFIG.oneSignal || window.PUSH_CONFIG)) || {};
      if (!cfg.appId) return;
      await OneSignal.init({
        appId: cfg.appId,
        safari_web_id: cfg.safari_web_id || cfg.safariWebId || '',
        notifyButton: cfg.notifyButton || { enable: true },
      });
    });
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
